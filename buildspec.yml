version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - echo "Checking Java version..."
      - java -version
      - echo "Making gradlew executable..."
      - chmod +x ./gradlew

  build:
    commands:
      - echo "Starting gradle build..."
      - ./gradlew build
      - echo "Build completed successfully"

  post_build:
    commands:
      - echo "Build finished at $(date)"
      - echo "Verifying artifact files..."
      - ls -la
      - ls -la build/libs/
      - ls -la scripts/
      - echo "Checking appspec.yml exists..."
      - |
        if [ -f appspec.yml ]; then
          echo "appspec.yml found"
        else
          echo "ERROR: appspec.yml NOT found"
        fi

artifacts:
  files:
    - build/libs/ROOT.war
    - appspec.yml
    - scripts/**/*
  name: shop-build-$(date +%Y%m%d-%H%M%S)
  discard-paths: no

cache:
  paths:
    - '/root/.gradle/caches/**/*'
    - '/root/.gradle/wrapper/**/*'
